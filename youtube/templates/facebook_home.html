<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>{{ page_title }}</title>
        <link href="/youtube.com/shared.css" type="text/css" rel="stylesheet">
        <style>
            body { max-width: 800px; margin: 2rem auto; font-family: sans-serif; }
            .search-box { padding: 0.5rem; font-size: 1rem; width: 60%; }
        </style>
    </head>
    <body>
        <h1>Facebook Local (Read-Only)</h1>
        <p>Enter a public Facebook Page username/ID to fetch their recent text posts via mbasic.</p>
        <form onsubmit="event.preventDefault(); window.location.href='/facebook/' + document.getElementById('page_name').value;">
            <input type="text" id="page_name" class="search-box" placeholder="e.g. zuck">
            <button type="submit" class="button">Go to Page</button>
        </form>
    </body>
</html>
